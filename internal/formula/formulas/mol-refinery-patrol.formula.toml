description = """
Merge queue processor patrol loop.

The Refinery is the Engineer in the engine room. You process polecat branches, merging them to their effective target branches one at a time with sequential rebasing.

**The Scotty Test**: Before proceeding past any failure, ask yourself: "Would Scotty walk past a warp core leak because it existed before his shift?"

## Merge Flow

The Refinery receives MERGE_READY mail from Witnesses when polecats complete work:

```
Witness                    Refinery                      Git        Polecat
   │                          │                           │            │
   │ MERGE_READY              │                           │            │
   │─────────────────────────>│                           │            │
   │                          │                           │            │
   │                    (verify branch)                   │            │
   │                          │ fetch & rebase            │            │
   │                          │──────────────────────────>│            │
   │                          │                           │            │
   │                    (run tests)                       │            │
   │                          │                           │            │
   │                    (if pass)                         │            │
   │                          │ merge & push              │            │
   │                          │──────────────────────────>│            │
   │ MERGED                   │                           │            │
   │<─────────────────────────│                           │            │
   │                          │                           │            │
   │                    (if fail)                         │            │
   │                          │          FIX_NEEDED       │            │
   │                          │───────────────────────────────────────>│
   │                          │                           │   (fix code)
   │                          │                           │  (resubmit)
```

After successful merge, Refinery sends MERGED mail back to Witness so it can
complete cleanup (nuke the polecat worktree).

On failure, Refinery sends FIX_NEEDED directly to the Polecat. The polecat
fixes the code in-place and resubmits the MR without losing context.

## CRITICAL: Read Step Instructions Before Acting

Before executing ANY step, you MUST run `bd show <step-id>` and read the full
description. Steps contain **Config:** values that override default behavior.
If a config says to skip, you skip. If it specifies a command, you use that
exact command — not your own assumption. Do NOT guess what a step requires
based on the step title or your role knowledge. The step description is the
source of truth.

## Variables

| Variable | Default | Description |
|----------|---------|-------------|
| wisp_type | patrol | Type of wisp created for this molecule |
| integration_branch_refinery_enabled | true | Whether refinery merges to integration branches |
| integration_branch_auto_land | false | Whether to auto-land integration branches when epic children all closed |
| run_tests | true | Whether to run tests before merging |
| setup_command | (empty) | Setup/install command (e.g., `pnpm install`). Empty = skip. |
| typecheck_command | (empty) | Type check command (e.g., `tsc --noEmit`). Empty = skip. |
| lint_command | (empty) | Lint command (e.g., `eslint .`). Empty = skip. |
| test_command | (empty) | Test command to run (if run_tests is true). Empty = skip. |
| build_command | (empty) | Build command (e.g., `go build ./...`). Empty = skip. |
| target_branch | main | Default target branch for merges |
| delete_merged_branches | true | Whether to delete source branches after merge |
| judgment_enabled | false | Enable quality review for merges (true/false) |
| review_depth | standard | Review depth: quick, standard, or deep |
| merge_strategy | direct | Merge strategy: 'direct' (ff-only merge+push) or 'pr' (GitHub PR) |
| require_review | false | Require at least one approving GitHub review before merging (pr mode only) |

## Target Resolution Rule

When instructions reference `<rebase-target>`, `<merge-target>`, or `<verification-target>`,
resolve that placeholder with this rule:

- If integration_branch_refinery_enabled = "true": use MR target when present, otherwise {{target_branch}}.
- If integration_branch_refinery_enabled = "false": always use {{target_branch}}.

## FORBIDDEN Actions

- FORBIDDEN: Landing integration branches to the default branch via raw git commands (`git merge`, `git push`).
  Integration branches may ONLY be landed via `gt mq integration land <epic-id>`.
  This applies regardless of `auto_land` configuration. The pre-push hook enforces this.

## Step Execution Order

You MUST process steps in strict DAG order. Walk through each step sequentially,
unless you are explicitly told to skip to a step.

## Abbreviated Patrol Mode (Idle Effort Tuning)

When `await-event` outputs `EFFORT: reduced`, run an ABBREVIATED patrol.
This happens when idle_cycles >= {{idle_effort_threshold}} (no events on channel).

Abbreviated patrol rules:
- **inbox-check**: Run `gt mail drain` and quick inbox check. Skip individual message processing unless new MERGE_READY found.
- **queue-scan**: Quick `gt mq list` check. If queue is empty, skip directly to check-integration-branches.
- **process-branch through merge-push**: Only run if queue-scan found work. Otherwise SKIP all.
- **loop-check through generate-summary**: SKIP if no merges were processed.
- **check-integration-branches**: Quick check only.
- **context-check**: Quick self-assessment (one sentence).
- **patrol-cleanup**: SKIP.
- **burn-or-loop**: Normal (await-event as usual).

When `await-event` outputs `EFFORT: full`, run all steps thoroughly (normal mode).

The goal: idle cycles should burn ~10% of the tokens a full patrol uses."""
formula = "mol-refinery-patrol"
version = 13

[vars]
[vars.wisp_type]
description = "Type of wisp created for this molecule"
default = "patrol"

[vars.idle_effort_threshold]
description = "Idle cycles before switching to abbreviated patrol (0 = always full)"
default = "1"

[vars.integration_branch_refinery_enabled]
description = "Whether the refinery merges to integration branches (true) or always to target_branch (false)"
default = "true"

[vars.integration_branch_auto_land]
description = "Whether to auto-land integration branches when epic children are all closed"
default = "false"

[vars.run_tests]
description = "Whether to run tests before merging"
default = "true"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.lint_command]
description = "Lint command (e.g., eslint .). Empty = skip."
default = ""

[vars.test_command]
description = "Test command to run (if run_tests is true). Empty = skip."
default = ""

[vars.build_command]
description = "Build command (e.g., go build ./...). Empty = skip."
default = ""

[vars.target_branch]
description = "Default target branch for merges"
default = "main"

[vars.delete_merged_branches]
description = "Whether to delete source branches after merge"
default = "true"

[vars.judgment_enabled]
description = "Enable quality review for merges (true/false)"
default = "false"

[vars.review_depth]
description = "Review depth: quick, standard, or deep"
default = "standard"

[vars.merge_strategy]
description = "Merge strategy: 'direct' (ff-only merge + push) or 'pr' (create GitHub PR). Default: direct."
default = "direct"

[vars.require_review]
description = "Require at least one approving GitHub review before merging (only applies when merge_strategy=pr)."
default = "false"

[vars.pr_reviewer]
description = "GitHub user/bot to request an automated review from (e.g., augment). Empty = skip automated review, proceed directly to human-approval gate. Only applies when merge_strategy=pr."
default = ""

[vars.pr_approver]
description = "GitHub user whose approving review gates the merge. Required when merge_strategy=pr. Only applies when merge_strategy=pr."
default = ""

[vars.pr_required_approvals]
description = "Minimum distinct APPROVED reviewers required before merge (the count gate, in addition to the pr_approver gate). Default 1 when merge_strategy=pr. Setting to 0 disables only the count gate — the pr_approver's approval is still required because it's a separate gate (and pr_approver is required by config validation when merge_strategy=pr). Only applies when merge_strategy=pr."
default = "1"

[vars.pr_review_loop_max]
description = "Maximum review-fix polecat dispatch cycles per PR before escalating. Only applies when merge_strategy=pr."
default = "3"

[vars.pr_merge_method]
description = "Merge method passed to the VCS provider when merging the PR. One of: squash, merge, rebase. Only applies when merge_strategy=pr."
default = "squash"

[vars.rig]
description = "Name of the rig this refinery belongs to (e.g., gastown, laser)"
default = "UNSET_RIG"

[vars.prefix]
description = "Beads prefix for this rig (e.g., gt for gastown, la for laser)"
default = "gt"

[[steps]]
id = "inbox-check"
title = "Check refinery mail"
description = """
First, clean up wisps from previous cycles (closed wisps + abandoned wisps):
```bash
bd mol wisp gc --closed --force
bd mol wisp gc --age 1h --force
```

Then check mail for MERGE_READY submissions, escalations, and messages.

```bash
gt mail inbox
```

For each message:

**MERGE_READY**:
A polecat's work is ready for merge. Extract details and track for processing.

```bash
# Parse MERGE_READY message body:
# Branch: <branch>
# Issue: <issue-id>
# Polecat: <polecat-name>
# MR: <mr-bead-id>
# Verified: clean git state, issue closed

# Track in your merge queue for this patrol cycle:
# - Branch name
# - Issue ID
# - Polecat name (REQUIRED for MERGED notification)
# - MR bead ID (REQUIRED for closing after merge)
```

**IMPORTANT**: You MUST track the polecat name, MR bead ID, AND message ID - you will need them
in merge-push step to send MERGED notification, close the MR bead, and archive the mail.

Mark as read. The work will be processed in queue-scan/process-branch.
**Do NOT archive yet** - archive after merge/reject decision in merge-push step.

**PATROL: Wake up**:
Witness detected MRs waiting but refinery idle. Acknowledge and archive:
```bash
gt mail archive <message-id>
```

**HELP / Blocked**:
Assess and respond. If you can't help, escalate to Mayor.
Archive after handling:
```bash
gt mail archive <message-id>
```

**HANDOFF**:
Read predecessor context. Check for in-flight merges.
Archive after absorbing context:
```bash
gt mail archive <message-id>
```

**Hygiene principle**: Archive messages after they're fully processed.
Keep only: pending MRs in queue. Inbox should be near-empty."""

[[steps]]
id = "queue-scan"
title = "Scan merge queue"
needs = ["inbox-check"]
description = """
Check the beads merge queue - this is the SOURCE OF TRUTH for pending merges.

```bash
git fetch --prune origin
gt mq list <rig>
```

The beads MQ tracks all pending merge requests. Do NOT rely on `git branch -r | grep polecat`
as branches may exist without MR beads, or MR beads may exist for already-merged work.

If queue empty, proceed to the "orphan-branch-check" step. Do NOT skip past
orphan-branch-check on an empty queue: orphan polecat branches on origin are
a failure signal that needs escalation, not a license to improvise merges.

For each MR in the queue, verify the branch still exists:
```bash
git branch -r | grep <branch>
```

If branch doesn't exist for a queued MR:
- Close the MR bead: `bd close <mr-id> --reason "Branch no longer exists"`
- Remove from processing queue

Track verified MR list for this cycle.

## STOP — read before doing anything that touches `main`

**NEVER merge a polecat branch that is not tracked by an open MR bead in
this rig's queue.** Observed failure (2026-04-19): a polecat's MR bead
creation failed upstream (unrelated bug); the refinery found the polecat
branch on origin with no MR, and — reasoning from the branch contents
alone — executed `git push origin FETCH_HEAD:refs/heads/main` as a
fast-forward. That single push bypassed the entire PR/review workflow
and merged unreviewed code to `main`.

Rules, in order of bindingness:

1. **The MR bead is the sole authorization to merge.** No MR bead, no
   merge. Period. It doesn't matter how clean the diff looks, how
   confident you are, or how close to trivial the change is.
2. **Never construct your own `git push … :main` / `… :refs/heads/main`
   refspec.** Merges happen via the `merge-push` step's documented
   path (direct: ff-only + push; pr: `gt refinery pr merge` — see
   rule 3 for why direct `gh pr merge` is tap-guarded). If the queue
   is empty, there is nothing to merge — go to orphan-branch-check.
3. **Under `merge_strategy = "pr"` the refinery does NOT push to main
   at all.** Merges go through `gt refinery pr merge` (the subcommand
   the merge-push step uses in pr mode), which internally subprocesses
   `gh pr merge` *after* verifying the configured PR.6 approval gates.
   A direct push to main from the refinery under pr-mode is a workflow
   violation even if it appears to work (the `push-main` tap guard will
   block it; don't try to work around the guard). **The `pr-workflow`
   tap guard also blocks `gh pr merge` invoked directly from Bash (G21
   fix)** — stay inside the `gt refinery pr …` subcommand tree (see
   TestRefineryPatrolMergePushHasPRBranch).
4. **If you find yourself about to do something the formula doesn't
   name explicitly: stop and escalate.** Open an escalation bead
   describing what you observed; do not act. "The formula doesn't
   cover this state" is an escalation trigger, never a license to
   improvise."""

[[steps]]
id = "orphan-branch-check"
title = "Detect and escalate orphan polecat branches"
needs = ["queue-scan"]
description = """
Fill the "polecat branch on origin, no MR bead" gap that the refinery
previously resolved by improvising a direct push to main. Under
`merge_strategy = "{{merge_strategy}}"`, an orphan polecat branch is
a failure signal, not a work item — escalate, don't merge.

**Step 1: enumerate polecat branches on origin**
Wrap `grep -oE` in `{ … || true; }` so "no polecat branches" doesn't
exit non-zero and abort the step under `set -e` / `pipefail`. A
healthy rig's steady state IS "no orphans" — the naïve pipeline
would treat that expected state as a hard failure:
```bash
git fetch --prune origin
ORPHAN_CANDIDATES=$(git branch -r \\
  | { grep -oE 'origin/polecat/[^ ]+' || true; } \\
  | sed 's|origin/||' \\
  | sort -u)
```

**Step 2: enumerate branches referenced by open MR beads**
Two hazards in this pipeline, both of which would abort the orphan
scan under `set -e`-style execution — and both trigger in exactly
the cases this step is meant to handle (empty queue, MRs with
non-standard descriptions):

1. `gt mq list --json` encodes an empty queue as JSON `null`, not
   `[]`. `jq '.[]'` errors on `null`. Coerce to an array with
   `(. // []) | .[]` so the empty-queue path is a clean no-op.
2. `capture()` errors when the input doesn't match the regex. The
   `// empty` alternative drops non-matching descriptions quietly.

```bash
MR_BRANCHES=$(gt mq list <rig> --json 2>/dev/null | \\
  jq -r '(. // []) | .[] | (.description // "") | capture("branch:\\\\s*(?<b>\\\\S+)") // empty | .b' \\
  | sort -u)
```

If `gt mq list` has no `--json` output or the queue is empty, `MR_BRANCHES`
is empty — that's fine, every candidate is then a potential orphan.

**Step 3: diff candidates against MR-covered branches**
`comm` with `<(echo "$VAR")` emits a blank line for an empty variable,
which turns into a bogus "empty-named" orphan. Use `printf '%s\\n'`
(which prints nothing for an empty var) and `grep -v '^$'` to guarantee
a clean set-difference:
```bash
ORPHANS=$(comm -23 \\
  <(printf '%s\\n' "$ORPHAN_CANDIDATES" | grep -v '^$' | sort -u) \\
  <(printf '%s\\n' "$MR_BRANCHES"       | grep -v '^$' | sort -u))
```

**Step 4: for each orphan, decide escalate vs skip**

- If the orphan was already escalated this patrol cycle (you have a
  record in scratch state), skip — don't duplicate-escalate.
- If the orphan is very recent (<5 minutes since last commit), skip
  this cycle — the polecat's `gt done` may still be in flight. Next
  cycle will re-check. Compute the age explicitly rather than eyeballing:
  ```bash
  LAST_COMMIT_TIME=$(git log -1 --format=%ct "origin/$branch")
  NOW=$(date +%s)
  AGE=$(( NOW - LAST_COMMIT_TIME ))
  if [ "$AGE" -lt 300 ]; then continue; fi   # <5 minutes old → skip
  ```
- Otherwise, escalate via an escalation bead (one bead per orphan,
  keyed on branch name to dedupe across cycles):

```bash
bd create \\
  --title="orphan polecat branch: <branch>" \\
  --labels=gt:escalation,refinery:orphan-branch \\
  --priority=1 \\
  --description="$(cat <<'EOD'
Refinery patrol detected a polecat branch on origin with no open MR bead.

Branch: <branch>
HEAD:   <commit-sha>
Author: <commit-author>
Seen at: <utc-timestamp> by refinery/<rig>

The refinery WILL NOT merge this branch — under merge_strategy=pr
(or direct) the only sanctioned merge path is an MR bead in the queue.
Likely causes:
  1. gt done failed to create the MR bead (known class of bug).
  2. The polecat was nuked mid-flight and its branch leaked.
  3. A human pushed a branch that's shaped like a polecat branch.

What to do next (human):
  - If the branch is real work: recreate the MR bead
    (gt mq submit --branch <branch> --issue <id>) and the next
    patrol will process it normally.
  - If the branch is leaked / dead: delete it
    (git push origin --delete <branch>).
EOD
)" \\
  --repo=<rig>
```

**Step 5: message overseer (only when there were actual orphans)**
After escalations are filed — and only then — send one consolidated
mail to overseer summarizing the orphans (so they're not sitting in
mail hell). Skip the mail entirely if `$ORPHANS` is empty; otherwise
the overseer gets a pointless notification every patrol cycle.
```bash
if [ -n "$ORPHANS" ]; then
  N=$(printf '%s\\n' "$ORPHANS" | wc -l | tr -d ' ')
  gt mail send overseer -s "Refinery: $N orphan polecat branches" \\
    --body-file=<(printf 'Patrol %s found orphan branches:\\n\\n%s\\n\\nEscalations filed.' \\
                         "$(date -u +%FT%TZ)" "$ORPHANS")
fi
```

**Step 6: proceed**
If the merge queue was empty and there were no orphans, skip to
check-integration-branches. If the queue had MRs, proceed to
process-branch as before."""

[[steps]]
id = "process-branch"
title = "Mechanical rebase"
# Serialize on orphan-branch-check so the orphan scan runs BEFORE any
# branch processing in a single patrol cycle. Without this, both steps
# had `needs = ["queue-scan"]` and a fan-out runner could schedule them
# in parallel — meaning process-branch could start on MR-queued work
# while orphans are still unescalated. Keeping them strictly sequential
# is cheap (orphan-branch-check is bounded and fast) and makes the
# ordering invariant explicit.
needs = ["orphan-branch-check"]
description = """
Pick next branch from queue. Attempt mechanical rebase on the MR's effective target branch.

**Config: integration_branch_refinery_enabled = {{integration_branch_refinery_enabled}}**
**Config: target_branch = {{target_branch}}**

**Step 0: Determine rebase target (must match merge target)**

Resolve `<rebase-target>` using the **Target Resolution Rule** above.
Do NOT hardcode `main` unless `main` is actually the resolved MR target.

**Step 0.5: Verify branch still exists (race-condition guard)**

Branches can disappear between queue-scan and here (e.g. cherry-picked to target directly).

```bash
git ls-remote --exit-code origin refs/heads/<polecat-branch>
```

If the branch no longer exists (exit code non-zero):
- Close the MR bead: `bd close <mr-id> --reason "Branch no longer exists"`
- Archive the MERGE_READY mail: `gt mail archive <message-id>`
- Skip to loop-check — do NOT treat as a merge failure, do NOT nudge the polecat

**Step 1: Checkout and attempt rebase**
```bash
git checkout -b temp origin/<polecat-branch>
git rebase origin/<rebase-target>
```

**Step 2: Check rebase result**

The rebase exits with:
- Exit code 0: Success - proceed to run-tests
- Exit code 1 (conflicts): Conflict detected - proceed to Step 3

To detect conflict state after rebase fails:
```bash
# Check if we're in a conflicted rebase state
ls .git/rebase-merge 2>/dev/null && echo "CONFLICT_STATE"
```

**Step 3: Handle conflicts (if any)**

If rebase SUCCEEDED (exit code 0):
- Skip to run-tests step (continue normal merge flow)

If rebase FAILED with conflicts:

1. **Abort the rebase** (DO NOT leave repo in conflicted state):
```bash
git rebase --abort
```

2. **Record conflict metadata**:
```bash
# Capture target SHA for reference
TARGET_SHA=$(git rev-parse origin/<rebase-target>)
BRANCH_SHA=$(git rev-parse origin/<polecat-branch>)
```

3. **Create conflict-resolution task**:
```bash
bd create --type=task --priority=1 \
  --title="Resolve merge conflicts: <original-issue-title>" \
  --description="## Conflict Resolution Required

Original MR: <mr-bead-id>
Branch: <polecat-branch>
Original Issue: <issue-id>
Conflict with target <rebase-target> at: ${TARGET_SHA}
Branch SHA: ${BRANCH_SHA}

## Instructions
1. Clone/checkout the branch
2. Rebase on target: git rebase origin/<rebase-target>
3. Resolve conflicts
4. Force push: git push -f origin <branch>
5. Close this task when done

The MR will be re-queued for processing after conflicts are resolved."
```

4. **Skip this MR** (do NOT delete branch or close MR bead):
- Leave branch intact for conflict resolution
- Leave MR bead open (will be re-processed after resolution)
- Continue to loop-check for next branch

**CRITICAL**: Never delete a branch that has conflicts. The branch contains
the original work and must be preserved for conflict resolution.

Track: rebase result (success/conflict), conflict task ID if created."""

[[steps]]
id = "run-tests"
title = "Run quality checks and tests"
needs = ["process-branch"]
description = """
**⚠ FIRST CHECK: If run_tests = "false", skip this ENTIRE step. Proceed directly to the next step. Do not run any quality checks or tests.**

**Config: run_tests = {{run_tests}}**
**Config: test_command = {{test_command}}**
**Config: setup_command = {{setup_command}}**
**Config: typecheck_command = {{typecheck_command}}**
**Config: lint_command = {{lint_command}}**
**Config: build_command = {{build_command}}**

If run_tests is "false": STOP HERE. Skip everything below and proceed to the next step.

**1. Run quality checks (skip any that are not configured):**

If setup_command is set: `{{setup_command}}`
If typecheck_command is set: `{{typecheck_command}}`
If lint_command is set: `{{lint_command}}`
If build_command is set: `{{build_command}}`

```bash
{{setup_command}}           # Make sure all newly added dependencies are installed (if command set)
{{typecheck_command}}       # Check for type errors (if command set)
{{lint_command}}            # Check for lint errors (if command set)
{{build_command}}           # Make sure it builds (if command set)
```

Empty commands mean "not configured for this project" — skip silently.

**2. If quality checks fail:**

Proceed to handle-failures step. Track which specific check failed
(setup/typecheck/lint/build) for the failure diagnosis.

**3. Run the test suite:**

```bash
{{test_command}}            # Run tests (configured per-rig)
```

Track results: pass count, fail count, specific failures."""

[[steps]]
id = "quality-review"
title = "Quality review merge diff"
needs = ["run-tests"]
description = """
**Config: judgment_enabled = {{judgment_enabled}}**
**Config: review_depth = {{review_depth}}**

Review the merge diff for quality issues. This step is measurement-only (Phase 1):
reviews are recorded but do NOT gate merges.

**Step 1: Check if quality review is enabled**

If judgment_enabled is not "true", skip this step entirely and proceed to
handle-failures. Log: "Quality review skipped (judgment_enabled=false)"

**Step 2: Get the merge diff**

```bash
git diff origin/main...temp
```

If the diff is empty, skip with: "No diff to review"

**Step 3: Review the diff**

Review the diff yourself using your judgment. Assess:

1. **Correctness**: Logic errors, off-by-one, nil/null handling, race conditions
2. **Security**: Injection, auth bypass, secrets in code, unsafe deserialization
3. **Clarity**: Naming, structure, comments where non-obvious
4. **Style**: Consistency with surrounding code, idiomatic patterns

Depth is controlled by review_depth:
- `quick`: Focus on correctness and security only. Skim for obvious issues.
- `standard`: All four categories. Moderate detail.
- `deep`: Thorough line-by-line review. Flag even minor style issues.

**Step 4: Score and recommend**

Assign a score from 0.0 to 1.0:
- 0.9-1.0: Excellent — no issues or only trivial nits
- 0.7-0.89: Good — minor issues only
- 0.45-0.69: Needs work — significant issues found
- 0.0-0.44: Breach — critical issues (security, correctness)

Recommendation:
- `approve`: Score >= 0.45
- `request_changes`: Score < 0.45

**Step 5: Record the result as a wisp**

Record the quality review result. This is fail-open: if the command fails,
log the error and continue — never block the merge.

```bash
bd create "quality-review: Score <score>, <recommendation>" -t chore --ephemeral \\
  -l type:plugin-run,plugin:quality-review-result,worker:<polecat-name>,rig:<rig-name>,score:<score>,recommendation:<approve|request_changes>,result:success \\
  -d "Score: <score>, <recommendation>. Issues: <count> (<summary>)" \\
  --silent 2>/dev/null || true
```

**Step 6: Handle breach scores (measurement-only)**

If score < 0.45 (breach threshold):
- Add a note to your merge summary: "Warning: Quality review breach (score: X.XX)"
- List the critical/major issues found
- Do NOT block the merge — Phase 1 is measurement-only
- Proceed to handle-failures normally

Track: review score, recommendation, issue count, duration."""

[[steps]]
id = "handle-failures"
title = "Handle quality check or test failures"
needs = ["quality-review"]
description = """
**VERIFICATION GATE**: This step enforces the Beads Promise.

If all checks and tests PASSED: This step auto-completes. Proceed to merge.

If any check or test FAILED:
1. Diagnose: Is this a branch regression or pre-existing on the target branch?
2. If branch caused it:
   - Abort merge (clean up temp branch)
   - **Send FIX_NEEDED directly to the polecat** (event-driven lifecycle):
     ```bash
     gt mail send <rig>/polecats/<polecat-name> -s "FIX_NEEDED <polecat-name>" --stdin <<'BODY'
     Branch: <branch>
     Issue: <issue-id>
     Polecat: <polecat-name>
     Rig: <rig>
     Target: <target-branch>
     Failed-At: $(date -u +%Y-%m-%dT%H:%M:%SZ)
     Failure-Type: <tests|build|lint|typecheck>
     Error: <failure description/output>
     MR-Bead-ID: <mr-bead-id>
     Attempt-Number: <N>
     BODY
     ```
   - **Update the bead** with failure details so they survive session death:
     ```bash
     bd update <issue-id> --notes "Merge failure (attempt <N>): <failure-type> - <error summary>"
     ```
   - **Do NOT close the MR bead** — the polecat will resubmit
   - **Do NOT delete the branch** — the polecat needs it for the fix
   - **Do NOT reopen the source issue** — the polecat is still working on it
   - **Do NOT send MERGE_FAILED to witness** — FIX_NEEDED goes to polecat directly
   - Clean up temp branch and skip to loop-check:
     ```bash
     git checkout {{target_branch}}
     git branch -D temp
     ```
   - Archive the MERGE_READY message
   - Skip to loop-check
3. If pre-existing on the target branch:
   - **DUPLICATE CHECK (MANDATORY)**: Before filing a new bug, search for existing open bugs:
     ```bash
     bd search "<failure description>" --status open --label gt:bug --limit 5
     ```
     If an existing open bug covers the same failure, do NOT create a duplicate.
     Instead, note the existing bead ID and proceed.
   - Only if NO existing bug matches: bd create --type=bug --priority=1 --title="Pre-existing failure: <description>"
   - FORBIDDEN: Writing code to fix quality check or test failures. You merge branches, you do not develop.
   - Proceed with the merge if the failure is pre-existing (not caused by the branch).

**FIX_NEEDED CHECKLIST** (all required before skipping to loop-check):
- [ ] FIX_NEEDED sent to polecat (with failure details)
- [ ] Bead updated with failure notes
- [ ] Temp branch cleaned up (NOT the polecat branch!)
- [ ] MERGE_READY message archived

**GATE REQUIREMENT**: You CANNOT proceed to merge-push without:
- All quality checks and tests passing, OR
- Bead filed (or existing duplicate confirmed) for the pre-existing failure

FORBIDDEN: Writing application code, exploring polecat implementations, or
re-implementing fixes. You are a mechanical merge processor.

This is non-negotiable. Never disavow. Never "note and proceed." """

[[steps]]
id = "merge-push"
title = "Merge and push"
needs = ["handle-failures"]
description = """
Merge and push. CRITICAL: Notifications come IMMEDIATELY after push.

**Config: integration_branch_refinery_enabled = {{integration_branch_refinery_enabled}}**
**Config: target_branch = {{target_branch}}**
**Config: delete_merged_branches = {{delete_merged_branches}}**
**Config: merge_strategy = {{merge_strategy}}**
**Config: require_review = {{require_review}}**

**Step 1: Merge (strategy-dependent)**

Determine `<merge-target>` using the **Target Resolution Rule** above.

**If merge_strategy = "direct" (default):**

```bash
git checkout <merge-target>
git merge --ff-only temp
git push origin <merge-target>
```

**Step 1.5 (direct only): VERIFY PUSH SUCCEEDED (CRITICAL - PATCH-003)**

Push can fail silently (network, auth, hooks). IMMEDIATELY verify:
```bash
git fetch origin
LOCAL_SHA=$(git rev-parse <merge-target>)
REMOTE_SHA=$(git rev-parse origin/<merge-target>)
echo "Local:  $LOCAL_SHA"
echo "Remote: $REMOTE_SHA"
```

**If SHAs match**: Push succeeded.

**Step 1.6 (direct only): CHECK FOR OPEN PR ON BRANCH (gas-fk4)**

Before proceeding to post-merge cleanup (which deletes the remote branch),
check if this branch has an open GitHub PR. Deleting the remote branch would
cause GitHub to auto-close the PR as "closed" (not "merged"), destroying
the PR audit trail and making it appear that work was rejected.

```bash
OPEN_PR=$(gh pr list --head <polecat-branch> --state open --json number --limit 1 2>/dev/null || echo "[]")
if [ "$OPEN_PR" != "[]" ] && [ "$OPEN_PR" != "" ]; then
  echo "Open PR found on branch — will use --skip-branch-delete in post-merge"
  # Set flag for Step 3 (post-merge cleanup) to skip branch deletion
  SKIP_BRANCH_DELETE=true
fi
```

If an open PR exists, pass `--skip-branch-delete` to `gt mq post-merge` in Step 3.
The PR should be merged or closed through the GitHub API, not by branch deletion.

Continue to Step 2.

**If SHAs differ**: STOP. Push failed silently.
- DO NOT send MERGED notification
- DO NOT close MR bead
- DO NOT delete branch
- Debug the push failure (check `git push` output, network, auth)
- Retry push and verify again before proceeding

**If merge_strategy = "pr":**

Under the refinery PR workflow, the formula orchestrates the PR lifecycle
through `gt refinery pr …` subcommands. The subcommands encapsulate
gh-CLI/graphql plumbing (idempotent PR creation, paginated thread listing,
approver-aware gating, etc.) so the formula stays short and portable.

**Step PR.1: Push the rebased polecat branch**

```bash
git checkout temp
git push origin temp:refs/heads/<polecat-branch> --force-with-lease
```

**Step PR.2: Create the PR (idempotent — returns existing PR if one is open)**

Build the PR body using bead metadata, then:

```bash
cat > /tmp/pr-body-<issue-id>.md <<'EOF'
## Summary

Automated merge from polecat branch.

- **Issue**: <issue-id>
- **Polecat**: <polecat-name>
- **Branch**: <polecat-branch>
- **Tests**: Passed (verified by refinery)

---
*Created by Gas Town Refinery*
EOF

PR_JSON=$({{ cmd }} refinery pr create \
  --branch <polecat-branch> \
  --base <merge-target> \
  --title "<issue-title> (<issue-id>)" \
  --body-file /tmp/pr-body-<issue-id>.md \
  --json)
PR=$(echo "$PR_JSON" | jq -r .number)
PR_URL=$(echo "$PR_JSON" | jq -r .url)
echo "PR #$PR: $PR_URL"
```

`gt refinery pr create` is idempotent — re-running it for an existing open
PR on the same branch returns that PR's number/url without creating a
duplicate.

**Step PR.3: Wait for CI checks**

⚠️ **DO NOT PROCEED until CI reaches a terminal state. DO NOT send MERGED
until the PR is actually merged.**

```bash
{{ cmd }} refinery pr wait-ci $PR
```

The command blocks until every check reaches a terminal state. Exit 0 iff
all checks succeeded. On `FAILURE` or timeout, non-zero exit — send
FIX_NEEDED back to the polecat and skip to the shared post-merge "Step 4: Archive the MERGE_READY mail" section further down the merge-push step (NOT Step PR.4 "Await reviewer engagement" — that's only reached on CI success):

```bash
gt mail send <rig>/polecats/<polecat-name> -s "FIX_NEEDED <polecat-name>" --stdin <<BODY
Branch: <branch>
Issue: <issue-id>
PR: ${PR_URL}
Failure-Type: ci-checks
Error: run 'gh pr checks $PR' for details
Attempt-Number: 1
BODY
```

**Step PR.4: Await reviewer engagement (patrol-resumable wait + thread gate)**

```bash
if [ -n "{{pr_reviewer}}" ]; then
  set +e
  {{ cmd }} refinery pr await-review $PR --mr $MR
  AWAIT_RC=$?
  set -e
  # await-review is patrol-resumable: it does at most ONE action per
  # invocation and returns immediately. State (when the trigger was
  # posted) lives on the MR bead's await_review_started_at field, so
  # subsequent patrols re-enter and check elapsed time without any
  # inline sleep. This is what keeps the merge queue unblocked while
  # one PR awaits its reviewer.
  case $AWAIT_RC in
    0)
      # Reviewer engaged AND threads clean — advance. PR.5's thread
      # poll below sees zero threads and falls through to PR.6.
      ;;
    1)
      # Trigger just posted, OR still inside the wait window, OR wait
      # elapsed but reviewer absent (within timeout). Either way we
      # take no further action this cycle — return to loop-check so
      # OTHER MRs can be processed. The next patrol re-enters here
      # with the persisted await_review_started_at.
      return 0 2>/dev/null || exit 0
      ;;
    2)
      # Unresolved threads — the await-review command already printed
      # the thread list. Fall through to PR.5 which will dispatch a
      # review-fix polecat (or hit the cap and escalate).
      ;;
    3)
      # Reviewer never engaged within --timeout. await-review printed
      # the escalation message; we open an escalation bead and park
      # the MR. The human closes the escalation when ready and the
      # next patrol picks the MR back up.
      {{ cmd }} escalate -s HIGH \
        "PR #$PR await-review timed out — reviewer {{pr_reviewer}} did not engage" \
        --mail mayor/ \
        --context "MR=$MR PR=$PR reviewer={{pr_reviewer}}"
      return 0 2>/dev/null || exit 0
      ;;
    *)
      echo "PR #$PR: await-review returned unexpected exit $AWAIT_RC; retrying next patrol"
      return 0 2>/dev/null || exit 0
      ;;
  esac
fi
```

`gt refinery pr await-review` is the imperative replacement for the
old `request-review`-then-trust-the-LLM flow. On its first
invocation for an MR it posts the trigger comment (`augment review`
by default; see `pr_trigger_comment`) and records the timestamp on
the MR bead. Subsequent invocations check elapsed time against
`pr_review_wait` (default 5 minutes — the physical-reality gate)
and `pr_review_timeout` (default 30 minutes), exiting non-zero
until either the reviewer engages with no unresolved threads or
the timeout escalates.

The wait is enforced by the binary, not by formula prose, so the
LLM cannot optimize it away. Earlier dogfood runs showed the
refinery merging PRs in ~54 seconds with the reviewer's response
landing 41 seconds after — patrol-resumable + bead-persisted state
means we get the wait without giving up parallel MR processing.

When `pr_reviewer` is empty, the review loop is skipped entirely
and the flow proceeds directly to the human-approval gate.

**Step PR.5: Review-fix (patrol-resumable, bounded by pr_review_loop_max, default 3)**

⚠️ **This is NOT a blocking loop.** Each patrol cycle, this step takes
**one** action — check in-flight polecat / poll threads / dispatch /
advance — and returns control to `loop-check` so the refinery keeps
processing other MRs. The next patrol cycle re-enters this step and picks
up where it left off. State (iteration counter + in-flight polecat name)
lives on the MR bead's attachment fields (`review_loop_iter`,
`review_fix_polecat`).

⚠️ **Three invariants this step MUST preserve** (each guarded by a
regression test in `pr_workflow_integration_test.go`):

1. **Author-agnostic thread counting.** Every unresolved thread counts
   toward the dispatch decision, regardless of who opened it — gemini,
   augment, a human, any bot. Never filter by author. Never park the
   MR "waiting for <specific reviewer>'s response" while other
   unresolved threads exist. If `gt refinery pr threads $PR --unresolved`
   returns N > 0, dispatch (unless the cap is hit).

2. **Reply AND RESOLVE, always.** The dispatch-args string handed to
   the review-fix polecat MUST tell the polecat to both reply to and
   resolve every thread it addresses (via
   `respond-to-thread.mjs --reply "..." --resolve <THREAD_ID>` or the
   `--commit` variant with `--resolve`). There is no auto-resolve on
   gastown PRs: gemini bots never resolve their own threads, augment
   only resolves its own on explicit re-review, and humans are out of
   the loop inside PR.5. If the polecat only replies (no resolve),
   the unresolved count stays non-zero, the loop iterates until cap,
   and the refinery escalates a PR whose code is fine — just the
   thread-close bookkeeping wasn't done. This is the G13 failure mode
   from the 2026-04-19 dogfood.

3. **Enumerate EVERY unresolved thread in dispatch args.** When composing
   `--args`, the polled `$THREADS` JSON MUST appear verbatim in the
   string — no paraphrasing into prose that silently drops threads.
   The polecat reads `$THREADS` to know which thread IDs to address.
   Dropping one thread from the summary means that thread stays
   unresolved, iter increments, and the refinery re-dispatches next
   cycle, wasting an iteration. This is the G14 failure mode from
   the same dogfood (iter-2 dispatch listed 3 of 4 threads in
   narrative form; the 4th thread went to iter-3).

```bash
MR=<mr-bead-id>
MAX={{pr_review_loop_max}}       # rig-level cap; default 3

# 1. Read MR-bead state. Two subtleties:
#
#   - `bd show <id> --json` returns a JSON array (one element per matching
#     ID), not a single object. A bare `jq -r '.description'` would yield
#     `null` on that array and the awk parse would come up empty, making
#     REVIEW_FIX_POLECAT always look unset — we'd re-dispatch on every
#     cycle and the cap would never trip. Normalize the shape first: if
#     the top-level is an array, take element 0; otherwise use it as-is.
#   - `; exit` after the first awk match so a later prose reference to
#     these keys (a comment or embedded narrative further down the
#     description) can't shadow the structured value.
MR_JSON=$(bd show "$MR" --json)
MR_DESC=$(echo "$MR_JSON" | jq -r 'if type == "array" then .[0].description else .description end // ""')

# Extract every per-MR variable PR.5 uses in one place, right after
# MR_DESC is read. PR.5 is patrol-resumable: no shell state survives
# across patrols, so every variable referenced anywhere in this step
# (including step 2's polecat-state echo / request-review and the
# later escalate / sling calls) must be derivable from MR_DESC here,
# before any other bash runs.
#
# review_pr was introduced by the G11 no-merge+pr handoff path and is
# now also set on MR beads created by the refinery's own pr-create
# step (see the dispatch flow under "If merge_strategy = \"pr\":" in
# Step 2). For regular merge-push MRs without a PR yet, PR.5 isn't
# reached — we only enter this step once the PR exists.
PR=$(echo "$MR_DESC" | awk -F': ' '/^review_pr:/ {print $2; exit}')
ISSUE_ID=$(echo "$MR_DESC" | awk -F': ' '/^source_issue:/ {print $2; exit}')
BRANCH=$(echo "$MR_DESC" | awk -F': ' '/^branch:/ {print $2; exit}')
if [ -z "$PR" ] || [ -z "$ISSUE_ID" ] || [ -z "$BRANCH" ]; then
  # Missing fields should be impossible for an MR bead that reached
  # PR.5 — if it happens, treat as a corrupted MR and escalate rather
  # than try to muddle through.
  {{ cmd }} escalate -s HIGH \
    "MR $MR missing PR.5 fields: review_pr='$PR' source_issue='$ISSUE_ID' branch='$BRANCH'" \
    --mail mayor/ \
    --context "$MR_DESC"
  return 0 2>/dev/null || exit 0
fi

REVIEW_FIX_POLECAT=$(echo "$MR_DESC" \
  | awk -F': ' '/^review_fix_polecat:/ {print $2; exit}')
REVIEW_LOOP_ITER=$(echo "$MR_DESC" \
  | awk -F': ' '/^review_loop_iter:/ {print $2; exit}')
# Sanitize to digits only. A non-numeric or trailing-whitespace value here
# would blow up the `-ge` test and the `$((... + 1))` arithmetic below and
# could leave the loop in a broken state. Strip non-digits and fall back
# to 0 — conservative for a hand-edited MR bead.
REVIEW_LOOP_ITER=$(printf '%s' "$REVIEW_LOOP_ITER" | tr -cd '0-9')
REVIEW_LOOP_ITER=${REVIEW_LOOP_ITER:-0}

# 2. If a review-fix polecat is already in flight, check whether it's done.
# Use a two-stage command so we can distinguish "status lookup failed" from
# "status lookup succeeded but polecat is gone". Without this, a transient
# `gt polecat status` failure (lock contention, rig stopped, network blip)
# produces an empty jq result that falls through to the terminal clause
# below and clears `review_fix_polecat` — losing track of the in-flight
# polecat and re-dispatching on the next patrol.
if [ -n "$REVIEW_FIX_POLECAT" ]; then
  POLECAT_STATUS_JSON=$({{ cmd }} polecat status "{{rig}}/$REVIEW_FIX_POLECAT" --json 2>/dev/null)
  POLECAT_STATUS_RC=$?
  if [ $POLECAT_STATUS_RC -ne 0 ] || [ -z "$POLECAT_STATUS_JSON" ]; then
    # Status lookup failed (non-zero exit or empty stdout). Keep the
    # "polecat in flight" state and try again next patrol. DO NOT clear
    # review_fix_polecat — we can't prove the polecat is gone.
    echo "PR #$PR: polecat $REVIEW_FIX_POLECAT status check failed (rc=$POLECAT_STATUS_RC); retrying next patrol"
    return 0 2>/dev/null || exit 0
  fi
  POLECAT_STATE=$(echo "$POLECAT_STATUS_JSON" | jq -r '.state // empty')
  # Polecat lifecycle states (see internal/polecat/types.go):
  #   working  — actively running the assigned issue (the only in-flight state)
  #   idle     — finished work, session killed, sandbox preserved for reuse
  #   done     — transient post-`gt done`; session should exit immediately
  #   stuck    — self-reported needs help
  #   stalled  — externally-detected dead session while assigned
  #   zombie   — orphaned tmux session without worktree
  #
  # For the review-fix loop, `working` is the ONLY state that means "still
  # in flight". All other recognized states indicate the polecat is past
  # the dispatch — either done (idle/done), failed (stuck/stalled/zombie),
  # or something external needs to intervene. In every non-`working` case
  # the refinery should clear the in-flight marker and re-poll threads on
  # the next patrol.
  case "$POLECAT_STATE" in
    working)
      # Still addressing threads. Skip this MR this cycle — we'll
      # re-check on the next patrol. Proceed to loop-check so OTHER
      # MRs in the queue can still be processed.
      echo "PR #$PR awaiting review-fix polecat $REVIEW_FIX_POLECAT (iter=$REVIEW_LOOP_ITER)"
      # Skip directly to loop-check (not to merge — PR isn't ready yet).
      return 0 2>/dev/null || exit 0
      ;;
    idle|done|stuck|stalled|zombie)
      # Terminal from the review-fix loop's perspective: the polecat is
      # no longer actively working. Clear the in-flight polecat AND the
      # await_review_started_at timestamp so the next patrol cycle's
      # PR.4 re-posts the trigger comment for the new HEAD and restarts
      # the wait window. The witness handles zombie/stalled cleanup on
      # its own schedule; we don't block on it.
      {{ cmd }} mq set-review-state "$MR" --clear-polecat --clear-await-started-at
      REVIEW_FIX_POLECAT=""
      ;;
    *)
      # Unrecognized state (including empty). Treat as transient — keep
      # the marker and retry next patrol rather than assume terminal.
      # If this recurs, either the polecat state set expanded and we
      # need to classify the new value, or the lookup is returning
      # garbage that the earlier rc/empty check didn't catch.
      echo "PR #$PR: polecat $REVIEW_FIX_POLECAT in unrecognized state '$POLECAT_STATE'; retrying next patrol"
      return 0 2>/dev/null || exit 0
      ;;
  esac
fi

# 3. No polecat in flight — poll unresolved threads. Author-agnostic: the --unresolved filter
# counts every open thread regardless of who opened it
# (gemini-code-assist auto-review, augment review, human review). Do
# NOT filter THREADS by author before the COUNT check; doing so
# reintroduces the G12b dogfood bug where the refinery parked an MR
# "waiting for augment" while three gemini threads sat unresolved.
THREADS=$({{ cmd }} refinery pr threads "$PR" --unresolved --json)
COUNT=$(echo "$THREADS" | jq 'length')

if [ "$COUNT" -eq 0 ]; then
  # Nothing unresolved — advance to Step PR.6 (human-approval gate).
  echo "PR #$PR: no unresolved review threads, advancing to wait-approval"
  # Fall through to Step PR.6 below.
elif [ "$REVIEW_LOOP_ITER" -ge "$MAX" ]; then
  # Cap hit: escalate, park this MR. The refinery does not block here —
  # the human closes the escalation when ready and the next patrol picks
  # the MR back up.
  {{ cmd }} escalate -s HIGH \
    "PR #$PR review loop exceeded $MAX iterations; $COUNT threads still unresolved" \
    --mail mayor/ \
    --context "$THREADS"
  return 0 2>/dev/null || exit 0
else
  # Dispatch a fresh review-fix polecat, record state on the MR bead,
  # return to patrol. Next cycle re-enters at step 1 and observes the
  # in-flight polecat.
  #
  # Only advance the iter counter when a polecat was actually dispatched.
  # If `gt sling` fails (auth issue, rig paused, beads lock contention,
  # etc.), incrementing the counter would consume an iteration without
  # any work happening — we'd hit the cap prematurely and escalate on
  # spurious failures. On failure we leave the state untouched; the next
  # patrol cycle retries from the same iter value.
  # The --args string MUST satisfy two invariants from the step-header
  # preamble. The wording here is deliberately tool-agnostic — polecats
  # may have different skills or helpers installed; the contract is
  # behavioral (reply AND resolve; enumerate every thread), not
  # implementation-specific.
  #
  #   (a) "Reply AND RESOLVE" — the polecat must both reply to and
  #       resolve every thread it addresses. GitHub's GraphQL
  #       resolveReviewThread mutation is the primitive (available via
  #       `gh api graphql` in any environment); skill-based helpers may
  #       also be available but are not required. Reply-only leaves
  #       threads unresolved; the loop never converges; the refinery
  #       escalates a PR whose code is fine.
  #
  #   (b) "Enumerate every thread" — the polled $THREADS JSON MUST appear
  #       verbatim inside --args. Do not paraphrase it into a narrative
  #       list that could silently drop items. The polecat reads $THREADS
  #       to know which thread IDs to address; a dropped ID = an
  #       unresolved thread = a wasted iteration.
  #
  # Both (a) and (b) are enforced by the regression test
  # TestRefineryPatrolReviewLoopEnforcesResolveAndEnumeration.
  POLECAT_NAME=$({{ cmd }} sling "review-fix/$ISSUE_ID" {{rig}} \
    --pr "$PR" \
    --branch "$BRANCH" \
    --args "You are a review-fix polecat for PR #$PR.

For EACH unresolved thread below: (1) apply the code fix, (2) commit and
push to the PR branch, (3) reply AND RESOLVE the thread. Use whatever
tool you have available — GitHub's resolveReviewThread GraphQL mutation
(via 'gh api graphql') is the canonical primitive; skill-based helpers
are fine if present. Do NOT reply without resolving — gastown has no
auto-resolve and the review loop cannot converge while any thread stays
unresolved.

Address every thread in the JSON below. Do not paraphrase it into your
own list. Do not drop, skip, or filter any thread based on who authored
it (gemini, augment, human — all count). When you think you're done,
run `gt refinery pr threads <PR-number> --unresolved --json` (with the
PR number substituted, not a shell variable) and verify the result is
an empty array. Then run gt done.

THREADS (unresolved, fresh poll at dispatch time):
$THREADS" \
    --json | jq -r '.polecat_name // empty')
  if [ -n "$POLECAT_NAME" ]; then
    NEW_ITER=$((REVIEW_LOOP_ITER + 1))
    {{ cmd }} mq set-review-state "$MR" \
      --polecat "$POLECAT_NAME" \
      --iter "$NEW_ITER"
    echo "PR #$PR: dispatched review-fix polecat $POLECAT_NAME (iter=$NEW_ITER of $MAX)"
  else
    echo "PR #$PR: review-fix dispatch FAILED — iter stays at $REVIEW_LOOP_ITER, will retry next patrol"
  fi
  return 0 2>/dev/null || exit 0
fi
```

`{{ cmd }} mq set-review-state` does an atomic read-modify-write on the
MR bead's description, mutating only the `review_fix_polecat` and
`review_loop_iter` fields. Other MR fields (branch, target, source_issue,
etc.) are preserved. Flags:
  --polecat <name>   — set review_fix_polecat
  --iter <n>         — set review_loop_iter
  --clear-polecat    — clear review_fix_polecat (polecat terminated)
  --clear-iter       — clear review_loop_iter

`REVIEW_FIX_DONE` mail from the polecat (sent by `gt done` when the
bead is a no_merge review-fix dispatch) is an optimization: it triggers
an `inbox-check` on the next cycle which brings the refinery back to
this step sooner. Even without the mail, the patrol's normal cadence
picks the MR back up within one cycle.

**Step PR.6: Wait for human approval (gate)**

```bash
{{ cmd }} refinery pr wait-approval $PR \
  --approver {{pr_approver}} \
  --min-approvals {{pr_required_approvals}} \
  --escalate
```

The command polls until both the configured approver has APPROVED *and*
the distinct-approver count meets `pr_required_approvals`. On timeout it
returns non-zero with a message naming the unmet gate.

**Step PR.7: Merge**

```bash
{{ cmd }} refinery pr merge $PR --method {{pr_merge_method}}
```

Delegates to the VCS provider's merge API, respecting branch protection.

**You MUST use `gt refinery pr merge` here, not `gh pr merge`.** The gt
subcommand runs the same `VerifyPRApproval` gates that PR.6 polled for —
so if you somehow reach PR.7 without a satisfied approval, the merge is
refused with a clear pointer back to PR.4 and PR.6. `gh pr merge` is
blocked by the `pr-workflow` tap-guard (G21 fix); attempting it prints
a banner titled `❌ DIRECT gh pr merge BLOCKED (G21 fix)` and exits
non-zero. If `gt refinery pr merge` fails with an error like
`PR #<n> requires approving review from <user> before merge` or
`PR #<n> has N of M required approvals`, DO NOT try to work around
it — go back to PR.4 (await-review) or PR.6 (wait-approval) and
resolve the gate.

⚠️ **STOP HERE - DO NOT PROCEED UNTIL THE PR IS ACTUALLY MERGED ON GITHUB**

**Step 2: Send MERGED Notification (REQUIRED - DO THIS IMMEDIATELY)**

RIGHT NOW, before any cleanup, send MERGED mail to Witness.

**If merge_strategy = "direct":**
```bash
gt mail send <rig>/witness -s "MERGED <polecat-name>" -m "Branch: <branch>
Issue: <issue-id>
Merged-At: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
```

**If merge_strategy = "pr":**
```bash
gt mail send <rig>/witness -s "MERGED <polecat-name>" -m "Branch: <branch>
Issue: <issue-id>
PR: ${PR_URL}
Merged-At: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
```

Note: In PR mode, MERGED is only sent AFTER `gh pr merge` succeeds — the PR
is actually merged on GitHub before the witness is notified.

This signals the Witness to nuke the polecat worktree. WITHOUT THIS NOTIFICATION,
POLECAT WORKTREES ACCUMULATE INDEFINITELY AND THE LIFECYCLE BREAKS.

**Step 3: Post-merge cleanup (REQUIRED — single command)**

This single command handles closing the MR bead, closing the source issue, and
deleting the remote polecat branch (respects delete_merged_branches config):

```bash
# If an open PR was detected in Step 1.6 (direct) or merge_strategy=pr,
# pass --skip-branch-delete to avoid auto-closing the PR via head_ref_delete.
# Otherwise, omit the flag.
gt mq post-merge <rig> <mr-bead-id>            # normal (no open PR)
gt mq post-merge <rig> <mr-bead-id> --skip-branch-delete  # open PR exists
```

The MR bead ID was in the MERGE_READY message or find via:
```bash
bd list --type=merge-request --status=open | grep <polecat-name>
```

Verify the command output shows all steps succeeded (✓ for each).

**Note**: In PR mode, the source branch is NOT deleted (it's the PR head branch).
`delete_merged_branches` is ignored when merge_strategy=pr — the branch is cleaned
up when the PR is merged on GitHub. The `--skip-branch-delete` flag (gas-fk4) also
prevents branch deletion when an open PR is detected in direct merge mode.

**Step 4: Archive the MERGE_READY mail (REQUIRED)**
```bash
gt mail archive <merge-ready-message-id>
```
The message ID was tracked when you processed inbox-check.

**Step 5: Cleanup temp branch**
```bash
git branch -d temp
```

**VERIFICATION GATE**: You CANNOT proceed to loop-check without:
- [x] MERGED mail sent to witness (with PR URL if merge_strategy=pr)
- [x] Post-merge cleanup completed (MR closed, source issue closed, branch deleted)
- [x] MERGE_READY mail archived

If you skipped notifications or archiving, GO BACK AND DO THEM NOW.

Target branch has moved. Any remaining branches need rebasing on new baseline."""

[[steps]]
id = "loop-check"
title = "Check for more work"
needs = ["merge-push"]
description = """
More branches to process?

**Entry paths:**
- Normal: After successful merge-push
- Conflict-skip: After process-branch created conflict-resolution task

If yes: Return to process-branch with next branch.
If no: Continue to generate-summary.

**Track for this cycle:**
- branches_merged: count and names of successfully merged branches
- branches_conflict: count and names of branches skipped due to conflicts
- conflict_tasks: IDs of conflict-resolution tasks created

This tracking feeds into generate-summary for the patrol digest."""

[[steps]]
id = "generate-summary"
title = "Generate handoff summary"
needs = ["loop-check"]
description = """
Summarize this patrol cycle.

**VERIFICATION**: Before generating summary, confirm for each merged branch:
- [ ] MERGED mail was sent to witness
- [ ] MR bead was closed
- [ ] Source issue was closed
- [ ] MERGE_READY mail archived

If any notifications, closures, or archiving were missed, do them now!

Include in summary:
- Branches merged (count, names)
- MERGED mails sent (count - should match branches merged)
- MR beads closed (count - should match branches merged)
- Source issues closed (count - should match branches merged)
- MERGE_READY mails archived (count - should match branches merged)
- Test results (pass/fail)
- Branches with conflicts (count, names)
- Conflict-resolution tasks created (IDs)
- Issues filed (if any)
- Any escalations sent

**Conflict tracking is important** for monitoring MQ health. If many branches
conflict, it may indicate target branches are moving too fast or branches are too stale.

This becomes the digest when the patrol is squashed."""

[[steps]]
id = "check-integration-branches"
title = "Check integration branches for landing"
needs = ["generate-summary"]
description = """
**Config: integration_branch_refinery_enabled = {{integration_branch_refinery_enabled}}**
**Config: integration_branch_auto_land = {{integration_branch_auto_land}}**

Read the two config values above, then:

- If integration_branch_refinery_enabled = "false": Say "Integration branches disabled." Close step.
- If integration_branch_auto_land = "false": Say "Auto-land disabled, nothing to do." Close step.
  FORBIDDEN: If auto_land is false, you MUST NOT land integration branches yourself using
  raw git commands. Do not merge integration branches to the default/target branch. Do not push
  integration branch merges. The auto_land=false setting means landing requires a human
  to run `gt mq integration land` manually. Respect this boundary unconditionally.
- If BOTH are "true":
  1. `bd list --type=epic --status=open` to find epics
  2. `gt mq integration status <epic-id>` for each epic
  3. If `ready_to_land: true`: run `gt mq integration land <epic-id>`
  4. If `ready_to_land: false`: do nothing, epic work is incomplete
  Never land partial epics — ALL children must be closed first."""

[[steps]]
id = "context-check"
title = "Assess session health"
needs = ["check-integration-branches"]
description = """
Assess whether this session should continue or hand off to a fresh one.

**Gather signals:**

1. **Process memory** — check your own RSS:
```bash
ps -o rss= -p $$   # KB — divide by 1024 for MB
```

2. **Session age** — how long has this tmux session been running:
```bash
CREATED=$(tmux display-message -t $(tmux display-message -p '#S') -p '#{session_created}')
echo "Session age: $(( ($(date +%s) - CREATED) / 3600 ))h"
```

3. **Context usage** — your internal sense of how much context you've consumed.
Are you losing track of earlier conversation? Getting verbose? Repeating yourself?

4. **Work done this cycle** — how many merges, how much complexity processed.

**The principle:** Fresh sessions are cheap. Memory bloat compounds over time and
affects the entire system — other agents, Dolt, and the OS all share the same RAM.
An idle session at 1.5 GB is worse than cycling and restarting at 200 MB.

**Make a judgment call.** If multiple signals suggest you're getting heavy
(high RSS, long session, substantial context consumed), hand off. If you're
light and there's active work in the queue, continue."""

[[steps]]
id = "patrol-cleanup"
title = "End-of-cycle inbox hygiene"
needs = ["context-check"]
description = """
Verify inbox hygiene before ending patrol cycle.

**Step 1: Check inbox state**
```bash
gt mail inbox
```

Inbox should contain ONLY:
- Unprocessed MERGE_READY messages (will process next cycle)
- Active work items

**Step 2: Archive any stale messages**

Look for messages that were processed but not archived:
- PATROL: Wake up that was acknowledged → archive
- HELP/Blocked that was handled → archive
- MERGE_READY where merge completed but archive was missed → archive

```bash
# For each stale message found:
gt mail archive <message-id>
```

**Step 3: Check for orphaned MR beads**

Look for open MR beads with no corresponding branch:
```bash
bd list --type=merge-request --status=open
```

For each open MR bead:
1. Check if branch exists: `git ls-remote origin refs/heads/<branch>`
2. Determine `<merge-target>` using the **Target Resolution Rule** above.
3. If branch is gone, pick `<verification-target>`:
   - If `origin/<merge-target>` exists, use `<merge-target>`.
   - If `origin/<merge-target>` is missing (e.g. deleted integration branch), use `{{target_branch}}`.
4. Verify landed work: `git log origin/<verification-target> --oneline | grep "<source_issue>"`
5. If work found → close MR with reason "Merged (verified on <verification-target>; merge target was <merge-target>)"
6. If work NOT found → investigate before closing:
   - Check source_issue validity (should be gt-xxxxx, not branch name)
   - Search reflog/dangling commits if possible
   - If unverifiable, close with reason "Unverifiable - no audit trail"
   - File bead if this indicates lost work

**NEVER close an MR bead without verifying the work landed or is unrecoverable.**

**Goal**: Inbox should have ≤3 active messages at end of cycle.
Keep only: pending MRs in queue."""

[[steps]]
id = "burn-or-loop"
title = "Burn and respawn or loop"
needs = ["patrol-cleanup"]
description = """
End of patrol cycle decision. Use the signals from context-check to decide.

**If you decide to continue patrolling:**

Resolve your agent bead ID for this patrol cycle. You MUST replace `<YOUR_RIG>` below with your actual rig name (e.g., `beads`, `town`) before running:
```bash
bd list --label=gt:agent --desc-contains="role_type: refinery" --json | jq -r '.[] | select(.status != "closed") | select(.description | test("(?m)^\\\\s*rig: <YOUR_RIG>\\\\s*$")) | .id'
```
This must return exactly one bead ID. If it returns zero results, STOP and report an error — verify you substituted `<YOUR_RIG>` correctly. If it returns multiple results, STOP and report an error — manual disambiguation is required. Use the single resolved bead ID as YOUR_AGENT_BEAD in the commands below.

Then use await-event to subscribe to the refinery event channel with exponential backoff:

```bash
gt mol step await-event --channel refinery --agent-bead YOUR_AGENT_BEAD \
  --backoff-base 30s --backoff-mult 2 --backoff-max 15m --cleanup
```

This command:
1. Watches `~/gt/events/refinery/` for event files (polling-based)
2. Returns IMMEDIATELY when an event is emitted (MERGE_READY, PATROL_WAKE, MQ_SUBMIT)
3. If no events, times out with exponential backoff:
   - First timeout: 30s
   - Second timeout: 60s
   - Third timeout: 120s
   - ...capped at 15 minutes max
4. Tracks `idle:N` label on refinery agent bead for backoff state
5. `--cleanup` auto-deletes processed event files
6. Outputs `EFFORT: reduced` or `EFFORT: full` directive for next cycle

**Supported events:**
- `MERGE_READY` — from witness when polecat branch is pushed and ready to merge
- `PATROL_WAKE` — from witness when MRs waiting but refinery appears idle
- `MQ_SUBMIT` — from polecat via `gt mq submit`

**On event received** (refinery-specific activity):
Reset the idle counter and start next patrol cycle:
```bash
gt agent state YOUR_AGENT_BEAD --set idle=0
```

**On timeout** (no events):
The idle counter was auto-incremented. Continue to next patrol cycle
(the longer backoff will apply next time).

## Effort-Based Patrol Routing

After await-event returns, check the EFFORT directive in the output:

**If `EFFORT: full`** — Run all steps thoroughly (normal patrol).

**If `EFFORT: reduced`** — Run ABBREVIATED patrol:
- inbox-check: Quick drain + check for MERGE_READY only
- queue-scan: Quick `gt mq list`. If empty, skip to check-integration-branches
- process-branch through merge-push: SKIP if queue empty
- loop-check through generate-summary: SKIP if no merges processed
- check-integration-branches: Quick check only
- context-check: One-sentence self-assessment
- patrol-cleanup: SKIP

Abbreviated patrol should complete in ~10% of the tokens of a full patrol.
Mark skipped steps as SKIP in the patrol report.

After await-event returns (either by event or timeout):
1. **Re-assess session health** (check RSS, context, age again — conditions change)
2. Close current patrol and start next cycle:
```bash
gt patrol report --summary "<brief summary: branches merged, test results, queue state>"
```
This closes the current patrol wisp and automatically creates a new one.
3. Continue executing from the first step of the new patrol cycle

**If you decide to hand off:**

Report and exit using `gt handoff` for clean session transition:

```bash
gt handoff -s "Patrol complete" -m "Merged X branches, Y tests passed.
Queue: empty/N remaining
RSS: X MB, Session age: Xh
Next: [any notes for successor]"
```

`gt handoff` sends handoff mail to yourself, respawns with a fresh Claude instance,
SessionStart hook runs gt prime, and your successor picks up from the hook.

**DO NOT just exit.** Always use `gt handoff` for proper lifecycle.

**IMPORTANT**: Never sleep-poll manually (e.g., `sleep 30 && bd list`).
Always use `gt mol step await-event` — it's event-driven and tracks backoff state."""
